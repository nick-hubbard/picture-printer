services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      GOOGLE_REDIRECT_URI: ""
    volumes:
      - uploads:/app/uploads
      - prints:/app/prints
      - google-photos:/app/google-photos
    expose:
      - "3000"

  https:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro

volumes:
  uploads:
  prints:
  google-photos:
