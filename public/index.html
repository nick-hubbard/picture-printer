<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Printer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel" aria-labelledby="title">
        <div>
          <p id="app-mode" class="eyebrow">Photo print layout</p>
          <h1 id="title">Prepare photos</h1>
        </div>

        <form id="print-form">
          <label class="drop-zone" for="photos">
            <input id="photos" name="photos" type="file" accept="image/*" multiple />
            <span class="drop-title">Choose photos</span>
            <span id="file-name" class="drop-meta">JPG, PNG, HEIC, or WebP</span>
          </label>

          <div id="photo-list" class="photo-list" aria-live="polite"></div>
          <input id="sizes" name="sizes" type="hidden" value="[]" />
          <input id="google-photo-ids" name="googlePhotoIds" type="hidden" value="[]" />

          <button id="submit-button" type="submit">Prepare pages</button>
        </form>

        <div class="google-row">
          <button id="google-button" class="secondary" type="button" disabled>
            Google Photos
          </button>
          <span id="google-status">OAuth setup required</span>
        </div>

        <p id="status" class="status" role="status"></p>
      </section>

      <section class="preview" aria-label="Print preview">
        <div class="preview-actions" aria-label="Prepared page actions">
          <button id="browser-print-button" class="secondary" type="button" disabled>Print</button>
        </div>
        <div id="preview-pages" class="preview-pages"></div>
        <p id="preview-empty">Choose photos to preview the print pages.</p>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
