<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Printer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="top-nav" aria-label="Account">
      <button id="browser-print-button" class="header-print-button" type="button" hidden>Print</button>
      <div class="account-menu">
        <button
          id="account-menu-button"
          class="icon-button"
          type="button"
          aria-label="Account menu"
          aria-expanded="false"
          aria-controls="account-menu"
          hidden
        >
          <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
            <path
              d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm0 2c-4.2 0-7 2.1-7 5v1h14v-1c0-2.9-2.8-5-7-5Z"
            />
          </svg>
        </button>
        <div id="account-menu" class="account-menu-popover" role="menu" hidden>
          <button id="settings-menu-button" class="menu-action" type="button" role="menuitem">
            Settings
          </button>
          <button id="google-disconnect" class="menu-action" type="button" role="menuitem">
            Sign out
          </button>
        </div>
      </div>
    </header>

    <main id="main-view" class="shell">
      <section class="panel" aria-labelledby="title">
        <div>
          <p id="app-mode" class="eyebrow">Photo print layout</p>
          <h1 id="title">Prepare photos</h1>
        </div>

        <div class="google-row">
          <button id="google-button" class="secondary" type="button" disabled>
            Google Photos
          </button>
        </div>

        <form id="print-form">
          <label class="drop-zone" for="photos" aria-label="Upload Photos">
            <input id="photos" name="photos" type="file" accept="image/*" multiple />
            <span class="drop-title">Upload Photos</span>
          </label>
          <span id="file-name" class="drop-meta">JPG, PNG, HEIC, or WebP</span>

          <input id="sizes" name="sizes" type="hidden" value="[]" />
          <input id="google-photo-ids" name="googlePhotoIds" type="hidden" value="[]" />
        </form>
      </section>

      <section class="preview" aria-label="Print preview">
        <div id="preview-pages" class="preview-pages"></div>
        <p id="preview-empty">Choose photos to preview the print pages.</p>
      </section>
    </main>

    <main id="settings-view" class="settings-shell" hidden>
      <section class="settings-panel" aria-labelledby="settings-title">
        <div class="settings-header">
          <div>
            <p class="eyebrow">Preferences</p>
            <h1 id="settings-title">Settings</h1>
          </div>
          <button id="settings-back-button" class="secondary settings-back-button" type="button">Back</button>
        </div>

        <form id="settings-form" class="settings-form">
          <label class="settings-field" for="default-print-size">
            <span>Default print size</span>
            <select id="default-print-size" name="defaultPrintSize"></select>
          </label>

          <fieldset class="settings-fieldset">
            <legend>Print sizes shown in menu</legend>
            <div id="visible-print-sizes" class="settings-checks"></div>
          </fieldset>
        </form>
      </section>
    </main>

    <div id="progress-overlay" class="progress-overlay" hidden>
      <div class="progress-dialog" role="status" aria-live="polite">
        <span class="progress-spinner" aria-hidden="true"></span>
        <p id="progress-status" class="progress-status"></p>
      </div>
    </div>

    <footer class="legal-links" aria-label="Legal links">
      <a href="/privacy.html">Privacy</a>
      <a href="/terms.html">Terms</a>
    </footer>

    <script src="/app.js" type="module"></script>
  </body>
</html>
